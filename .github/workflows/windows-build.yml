name: Build VoIP Matrix Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fetch All Tags
        run: |
          git fetch --tags --force
          cd external/linphone-sdk
          git fetch --tags --force 2>/dev/null || true
          git describe --tags 2>/dev/null || git tag 5.3.0-fake HEAD
        shell: bash

      - name: Install Python Dependencies
        run: |
          python3 -m pip install pystache six
          python -m pip install pystache six
        shell: pwsh

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qt5compat qtmultimedia'

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.28.0'

      - name: Configure CMake
        run: |
          $pythonPath = (Get-Command python).Source
          Write-Host "Python path: $pythonPath"
          cmake -B build `
            -DLINPHONEAPP_APPLICATION_NAME="VoIP Matrix" `
            -DLINPHONEAPP_EXECUTABLE_NAME="voipmatrix" `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_APP_PACKAGING=ON `
            -DPython3_EXECUTABLE="$pythonPath"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release --parallel
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoIPMatrix-Windows
          path: build/OUTPUT/
          retention-days: 30
